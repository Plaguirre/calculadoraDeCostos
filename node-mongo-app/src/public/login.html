<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Calculadora de Costos</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f6fa}
    .card{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.08);width:320px}
    input{width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:4px}
    button{width:100%;padding:10px;background:#2d7cf0;color:#fff;border:none;border-radius:4px;cursor:pointer}
    .msg{margin-top:12px;font-size:14px;color:#c0392b}
    .success{color: #2d7f2d}
  </style>
</head>
<body>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required />
      <label for="password">Contraseña</label>
      <input id="password" type="password" required minlength="6" />
      <button type="submit">Entrar</button>
    </form>
    <div id="message" class="msg" role="status"></div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
